[recipe]
name = "Super Mario 64 (sm64ex)"
slug = "sm64ex"
description = "Native PC port of Super Mario 64 via sm64ex with analog camera and texture fixes."
version = "0.1.0"
upstream = "https://github.com/sm64pc/sm64ex"
estimated_disk = "500 MB"

[container]
base_image = "registry.fedoraproject.org/fedora:latest"

[steam]
name = "Super Mario 64"
launch_options = ""

# Prompts — rendered by CLI, values passed as build args to Containerfile

[[prompts]]
type = "file"
key = "baserom"
label = "Super Mario 64 ROM"
description = "Z64 format (big endian, 8 MB). US, JP, EU, or Shindou versions are supported."
required = true

  [[prompts.variants]]
  id = "us"
  filename = "baserom.us.z64"
  sha256 = "17ce077343c6133f8c9f2d6d6d9a4ab62c8cd2aa57c40aea1f490b4c8bb21d91"

[[prompts]]
type = "confirm"
key = "nodrawingdistance"
label = "Remove draw distance limit?"
default = true

[[prompts]]
type = "confirm"
key = "texturefixes"
label = "Enable texture bug fixes?"
default = true
